<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Compile MindAR target</title>
  </head>
  <body>
    <div id="status">idle</div>
    <script type="module">
      import { Compiler } from "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js";

      window.__compileState = { done: false, error: null, base64: null };

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = src;
        });
      }

      function bufferToBase64(buffer) {
        let binary = "";
        const bytes = new Uint8Array(buffer);
        const chunk = 0x8000;
        for (let i = 0; i < bytes.length; i += chunk) {
          binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
        }
        return btoa(binary);
      }

      (async () => {
        try {
          const src = new URLSearchParams(location.search).get("src") || "./media/images/cat-target.jpg";
          document.getElementById("status").textContent = "loading image " + src + "...";
          const img = await loadImage(src);
          window.__compileState.imgDims = { width: img.naturalWidth, height: img.naturalHeight };

          document.getElementById("status").textContent = "compiling...";
          const compiler = new Compiler();
          await compiler.compileImageTargets([img], (progress) => {
            document.getElementById("status").textContent =
              "compiling... " + progress.toFixed(1) + "%";
          });

          const buffer = compiler.exportData();
          window.__compileState.base64 = bufferToBase64(buffer);
          window.__compileState.done = true;
          document.getElementById("status").textContent = "done";
        } catch (err) {
          window.__compileState.error = String(err && err.stack || err);
          document.getElementById("status").textContent = "error: " + window.__compileState.error;
        }
      })();
    </script>
  </body>
</html>
